template:
  bootstrap: 5
  light-switch: false
  bslib:
    # Core colors
    primary: "#063757"
    fg: "#334155"
    bg: "#FFFFFF"
    link-color: "#1372AE"

    # Typography — font files loaded via @font-face in extra.scss
    base_font: "Figtree, sans-serif"
    heading_font: "Figtree, sans-serif"
    code_font: "Fira Code, monospace"
    font_scale: 1.0

    # Component tweaks
    border-radius: 0.25rem
    btn-border-radius: 0.25rem
    pkgdown-nav-height: 62px

navbar:
  type: dark
  bg: "#063757"

authors:
  Economic Policy Institute:
    href: https://www.epi.org
    html: >-
      <img src='https://files.epi.org/2016/economic-policy-institute-epi-horizontal-logo.png' alt='Economic Policy Institute' width='180' />

footer:
  structure:
    left: developed_by
    right: built_with
  components:
    built_with: >-
      Site built with [pkgdown](https://pkgdown.r-lib.org/) and
      [epitemplate](https://economic.github.io/epitemplate/).
